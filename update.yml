name: Haftalık makro veri güncelleme

on:
  schedule:
    # Her Pazartesi 05:00 UTC = 08:00 Türkiye saati
    - cron: "0 5 * * 1"
  workflow_dispatch: {}   # Elle de tetiklenebilir (Actions sekmesinden "Run workflow")

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Veriyi çek ve işle
        env:
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
        run: python scripts/collect_data.py

      - name: Değişiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Haftalık veri güncellemesi $(date +%F)"
            git push
          fi
